name: Auto Move Problems
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  move:
    if: github.repository_owner != 'algo-gongbu'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Merge platform folders safely
        run: |
          TARGET=${{ vars.BAEKJOON_ID }}
          
          if [ -z "$TARGET" ]; then
            echo "Error: BAEKJOON_ID variable is not set."
            exit 1
          fi
          if [ ! -d "$TARGET" ]; then
            echo "Error: Target folder $TARGET does not exist!"
            exit 1
          fi
          
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          MOVED=false
          PLATFORMS=("백준" "프로그래머스")
          
          for PLATFORM in "${PLATFORMS[@]}"; do
            if [ -d "$PLATFORM" ]; then
              echo "Moving $PLATFORM folder..."
              mkdir -p "$TARGET/$PLATFORM"
              rsync -av --remove-source-files "$PLATFORM/" "$TARGET/$PLATFORM/"
              rm -rf "$PLATFORM"
              MOVED=true
            fi
          done
          
          if [ "$MOVED" = true ]; then
            git add .
            git commit -m "auto: merge solved problems into $TARGET folder [skip ci]"
            
            # ⭐ 핵심: retry 로직 추가
            for i in {1..3}; do
              git pull --rebase origin main && break || {
                if [ $i -eq 3 ]; then
                  echo "Failed after 3 retries"
                  exit 1
                fi
                echo "Retry $i/3..."
                sleep 5
              }
            done
            
            git push
          else
            echo "No platform folders to move."
          fi
