name: Notify Dashboard on Push

on:
  push:
    branches:
      - main

jobs:
  notify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Send repository_dispatch to dashboard repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DASHBOARD_REPO_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: "algo-gongbu",
              repo: "algo-dashboard",
              event_type: "algo-study-push",
              client_payload: {
                pusher: context.actor,
                ref: context.ref,
                sha: context.sha,
                triggered_at: new Date().toISOString()
              }
            });
            console.log(`Dispatch 전송 완료 - pusher: ${context.actor}`);
