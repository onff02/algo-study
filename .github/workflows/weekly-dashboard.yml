name: Weekly Dashboard

on:
  push:
    branches:
      - main

  schedule:
    # Sunday 23:59 KST (UTC 14:59)
    - cron: '59 14 * * 0'

  workflow_dispatch:

permissions:
  contents: write

# 동시에 여러 workflow가 실행되며 충돌나는 상황 방지
concurrency:
  group: weekly-dashboard
  cancel-in-progress: true

jobs:
  dashboard:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      # =========================================
      # 0️⃣ Repository Checkout
      # =========================================
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # =========================================
      # 1️⃣ 이번 주 PR 통계 계산
      # =========================================
      - name: Generate Weekly Stats
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const org = context.repo.owner;
            const repo = context.repo.repo;

            // =====================================
            // KST 기준 이번 주 월요일 00:00 계산
            // =====================================
            const now = new Date();

            const kstNow = new Date(
              now.toLocaleString("en-US", {
                timeZone: "Asia/Seoul"
              })
            );

            const day = kstNow.getDay(); // 0 = Sunday
            const diff = day === 0 ? 6 : day - 1;

            kstNow.setDate(kstNow.getDate() - diff);
            kstNow.setHours(0, 0, 0, 0);

            const mondayUTC = new Date(kstNow.toISOString());

            console.log("KST Monday:", kstNow.toISOString());
            console.log("UTC Monday:", mondayUTC.toISOString());

            // =====================================
            // Closed PR 조회
            // =====================================
            const { data: pulls } =
              await github.rest.pulls.list({
                owner: org,
                repo: repo,
                state: "closed",
                per_page: 100
              });

            // =====================================
            // 이번 주 merge된 PR만 필터링
            // =====================================
            const weekly = pulls.filter(pr =>
              pr.merged_at &&
              new Date(pr.merged_at) >= mondayUTC
            );

            console.log(
              "Merged PR count this week:",
              weekly.length
            );

            // =====================================
            // 작성자 기준 집계
            // =====================================
            const counts = {};

            weekly.forEach(pr => {
              const author = pr.user.login;

              if (!counts[author]) {
                counts[author] = 0;
              }

              counts[author]++;
            });

            // =====================================
            // Markdown 테이블 생성
            // =====================================
            let table = "";

            table += `📅 기준: ${kstNow
              .toISOString()
              .slice(0, 10)} (월요일 00:00 KST)\n\n`;

            table += "| Member | Count | Status |\n";
            table += "|--------|-------|--------|\n";

            const authors =
              Object.keys(counts).sort();

            if (authors.length === 0) {
              table += "| - | 0 | ❌ |\n";
            } else {
              authors.forEach(user => {
                const count = counts[user];
                const status =
                  count >= 5 ? "✅" : "❌";

                table +=
                  `| ${user} | ${count} | ${status} |\n`;
              });
            }

            fs.writeFileSync("dashboard.md", table);

      # =========================================
      # 2️⃣ README 치환
      # =========================================
      - name: Inject into README
        run: |
          START="<!-- WEEKLY_DASHBOARD_START -->"
          END="<!-- WEEKLY_DASHBOARD_END -->"

          awk -v start="$START" -v end="$END" '
          $0 ~ start {
            print;
            print "";

            while ((getline line < "dashboard.md") > 0)
              print line;

            skip=1;
            next;
          }

          $0 ~ end {
            skip=0;
            print;
            next;
          }

          !skip
          ' README.md > temp.md

          mv temp.md README.md

      # =========================================
      # 3️⃣ 변경사항 커밋 및 푸시 (conflict 자동 해결)
      # =========================================
      - name: Commit and Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add README.md dashboard.md

          # 변경사항이 있을 때만 commit/push
          if ! git diff --staged --quiet; then
            git commit -m "📊 weekly dashboard update [skip ci]"

            # ⭐ 핵심: Rebase 중 conflict 자동 해결
            git fetch origin main
            
            # Rebase 중 ours 전략으로 충돌 자동 해결
            git rebase --strategy-option=ours origin/main || {
              # Rebase 실패 시, reset 후 merge로 전환
              echo "Rebase failed, switching to merge strategy..."
              git rebase --abort
              git merge origin/main -m "Merge with origin/main [skip ci]" -X ours
            }

            # 최종 push (최대 3회 재시도)
            for i in {1..3}; do
              git push origin HEAD:main && break || {
                if [ $i -eq 3 ]; then
                  echo "Failed to push after 3 retries"
                  exit 1
                fi
                echo "Push retry $i/3..."
                sleep $((i * 3))
              }
            done
          else
            echo "No changes to commit"
          fi
