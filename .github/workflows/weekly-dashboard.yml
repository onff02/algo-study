name: Weekly Dashboard

on:
  push:
    branches:
      - main

  schedule:
    # Sunday 23:59 KST (UTC 14:59)
    - cron: '59 14 * * 0'

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-dashboard
  cancel-in-progress: true  # ⭐ true → false로 변경

jobs:
  dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Generate Weekly Stats
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const org = context.repo.owner;
            const repo = context.repo.repo;

            const now = new Date();

            const kstNow = new Date(
              now.toLocaleString("en-US", {
                timeZone: "Asia/Seoul"
              })
            );

            const day = kstNow.getDay();
            const diff = day === 0 ? 6 : day - 1;

            kstNow.setDate(kstNow.getDate() - diff);
            kstNow.setHours(0, 0, 0, 0);

            const mondayUTC = new Date(kstNow.toISOString());

            console.log("KST Monday:", kstNow.toISOString());
            console.log("UTC Monday:", mondayUTC.toISOString());

            const { data: pulls } =
              await github.rest.pulls.list({
                owner: org,
                repo: repo,
                state: "closed",
                per_page: 100
              });

            const weekly = pulls.filter(pr =>
              pr.merged_at &&
              new Date(pr.merged_at) >= mondayUTC
            );

            console.log(
              "Merged PR count this week:",
              weekly.length
            );

            const counts = {};

            weekly.forEach(pr => {
              const author = pr.user.login;

              if (!counts[author]) {
                counts[author] = 0;
              }

              counts[author]++;
            });

            let table = "";

            table += `📅 기준: ${kstNow
              .toISOString()
              .slice(0, 10)} (월요일 00:00 KST)\n\n`;

            table += "| Member | Count | Status |\n";
            table += "|--------|-------|--------|\n";

            const authors =
              Object.keys(counts).sort();

            if (authors.length === 0) {
              table += "| - | 0 | ❌ |\n";
            } else {
              authors.forEach(user => {
                const count = counts[user];
                const status =
                  count >= 5 ? "✅" : "❌";

                table +=
                  `| ${user} | ${count} | ${status} |\n`;
              });
            }

            fs.writeFileSync("dashboard.md", table);

      - name: Inject into README
        run: |
          START="<!-- WEEKLY_DASHBOARD_START -->"
          END="<!-- WEEKLY_DASHBOARD_END -->"

          awk -v start="$START" -v end="$END" '
          $0 ~ start {
            print;
            print "";

            while ((getline line < "dashboard.md") > 0)
              print line;

            skip=1;
            next;
          }

          $0 ~ end {
            skip=0;
            print;
            next;
          }

          !skip
          ' README.md > temp.md

          mv temp.md README.md

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add README.md dashboard.md

          if ! git diff --staged --quiet; then
            git commit -m "📊 weekly dashboard update [skip ci]"

            # ⭐ 충돌 방지: pull --rebase 추가
            for i in {1..3}; do
              git pull --rebase origin main && break || {
                if [ $i -eq 3 ]; then
                  echo "Failed after 3 retries"
                  exit 1
                fi
                echo "Retry $i/3 (${i}초 대기)..."
                sleep $((i * 2))
              }
            done

            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
