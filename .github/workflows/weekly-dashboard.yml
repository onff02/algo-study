name: Weekly Dashboard

on:
  push:
    branches:
      - main

  schedule:
    - cron: '0 15 * * 0'

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: weekly-dashboard
  cancel-in-progress: false

jobs:
  dashboard:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      # =========================================
      # 0️⃣ Repository Checkout
      # =========================================
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      # =========================================
      # 1️⃣ Weekly PR Stats 생성
      # =========================================
      - name: Generate Weekly Stats
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const owner = "algo-gongbu";
            const repo = "algo-study";

            const now = new Date();

            const kstParts = Object.fromEntries(
              new Intl.DateTimeFormat("en-US", {
                timeZone: "Asia/Seoul",
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                weekday: "short",
                hour12: false
              }).formatToParts(now).map(p => [p.type, p.value])
            );

            const kstYear = parseInt(kstParts.year);
            const kstMonth = parseInt(kstParts.month) - 1;
            const kstDay = parseInt(kstParts.day);

            const kstWeekday = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]
              .indexOf(kstParts.weekday);
            const diffToMonday = kstWeekday === 0 ? 6 : kstWeekday - 1;

            const mondayKST_inUTC = new Date(Date.UTC(
              kstYear,
              kstMonth,
              kstDay - diffToMonday,
              -9, 0, 0, 0
            ));

            const mondayLabel = new Date(
              mondayKST_inUTC.getTime() + 9 * 60 * 60 * 1000
            ).toISOString().slice(0, 10);

            console.log(`기준 월요일 (KST): ${mondayLabel}`);
            console.log(`기준 UTC: ${mondayKST_inUTC.toISOString()}`);

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "closed",
              per_page: 100
            });

            const weekly = pulls.filter(pr =>
              pr.merged_at &&
              new Date(pr.merged_at) >= mondayKST_inUTC &&
              !pr.user.login.includes("[bot]")
            );

            console.log(`이번 주 merged PR 수: ${weekly.length}`);
            weekly.forEach(pr =>
              console.log(`  - #${pr.number} ${pr.title} by ${pr.user.login} at ${pr.merged_at}`)
            );

            const counts = {};
            weekly.forEach(pr => {
              const author = pr.user.login;
              counts[author] = (counts[author] || 0) + 1;
            });

            let table = `📅 기준 주간 시작: ${mondayLabel} (월요일 00:00 KST)\n\n`;
            table += "| Member | Count | Status |\n";
            table += "|--------|-------|--------|\n";

            const authors = Object.keys(counts).sort();
            if (authors.length === 0) {
              table += "| - | 0 | ❌ |\n";
            } else {
              authors.forEach(user => {
                const count = counts[user];
                const status = count >= 5 ? "✅" : "❌";
                table += `| ${user} | ${count} | ${status} |\n`;
              });
            }

            fs.writeFileSync("dashboard_table.txt", table);
            console.log("dashboard_table.txt 생성 완료:\n" + table);

      # =========================================
      # 2️⃣ README 업데이트
      # =========================================
      - name: Inject Dashboard into README
        run: |
          python3 <<'PY'
          from pathlib import Path
          import sys

          readme = Path("README.md")
          table_file = Path("dashboard_table.txt")

          if not readme.exists():
              print("ERROR: README.md not found", file=sys.stderr)
              sys.exit(1)
          if not table_file.exists():
              print("ERROR: dashboard_table.txt not found", file=sys.stderr)
              sys.exit(1)

          content = readme.read_text(encoding="utf-8")
          dashboard = table_file.read_text(encoding="utf-8").strip()

          start_marker = "<!-- WEEKLY_DASHBOARD_START -->"
          end_marker = "<!-- WEEKLY_DASHBOARD_END -->"

          if start_marker not in content:
              print(f"ERROR: '{start_marker}' not found in README.md", file=sys.stderr)
              sys.exit(1)
          if end_marker not in content:
              print(f"ERROR: '{end_marker}' not found in README.md", file=sys.stderr)
              sys.exit(1)

          before = content.split(start_marker)[0]
          after = content.split(end_marker)[1]

          updated = before + start_marker + "\n" + dashboard + "\n" + end_marker + after
          readme.write_text(updated, encoding="utf-8")

          print("README.md 업데이트 완료!")
          print("--- 삽입된 내용 ---")
          print(dashboard)
          PY

      # =========================================
      # 3️⃣ Commit & Push
      # =========================================
      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          if git diff --staged --quiet; then
            echo "변경사항 없음 - 스킵"
            exit 0
          fi

          git commit -m "📊 weekly dashboard update"

          for i in 1 2 3; do
            echo "Push 시도 $i/3..."
            git fetch origin main
            git rebase origin/main && git push origin HEAD:main && {
              echo "Push 성공!"
              break
            }

            if git rebase --show-current-patch 2>/dev/null; then
              git rebase --abort
            fi

            if [ $i -eq 3 ]; then
              echo "Push 최종 실패"
              exit 1
            fi
            sleep 5
          done
